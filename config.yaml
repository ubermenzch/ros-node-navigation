# ============================================================
# 地图节点配置
# ============================================================
map_node:
  # ========== 订阅话题 ==========
  subscriptions:
    gps_path_topic: "/navigation_control"              # 下发的 GPS 导航路径,frame_id=gcj
    map_pose_topic: "/navigation/map_pose"             # 机器人地图坐标（来自 ekf_fusion_node）,frame_id=map
    local_costmap_topic: "/navigation/local_costmap"   # 接收局部costmap,frame_id=base_link

  # ========== 发布话题 ==========
  publications:
    map_topic: "/navigation/map"                                  # 全局地图（供rviz2可视化和其他节点使用）,frame_id=map
    map_update_topic: "/navigation/map_update"         # 地图增量更新（OccupancyGridUpdate）,frame_id=map
    nav_map_points_topic: "/navigation/nav_map_points" # 导航地图坐标（供 planner_node 使用）,frame_id=map

  # 工作频率 (Hz)
  frequency: 10.0

  # 超时配置 (秒)
  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  map_pose_timeout: 1.0      # 机器人地图坐标超时时间
  local_costmap_timeout: 0.5 # 局部costmap超时时间

  # 地图扩展参数
  square_size: 10.0       # 地图扩展边界大小 (米)
  road_width: 1.0         # 道路宽度 (米)

  # 日志配置
  log_enabled: true

# ============================================================
# 控制器节点配置
# ============================================================
controller_node:
  # ========== 订阅话题 ==========
  subscriptions:
    path_topic: "/navigation/planned_path"           # 路径话题（来自 planner_node）,frame_id=base_link
    lidar_obs_topic: "/navigation/obs_min_d"         # 障碍物观测（来自 lidar_costmap_node）,frame_id=base_link
    odom_topic: "/utlidar/robot_odom"               # 里程计,frame_id=odom (机器狗自带里程计)

  # ========== 发布话题 ==========
  publications:
    cmd_topic: "/cmd_vel"                # 控制指令

  # 超时配置 (秒)
  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  path_timeout: 0.5          # 路径超时时间
  lidar_obs_timeout: 0.3     # 障碍物观测超时时间
  odom_timeout: 0.2           # 里程计超时时间

  # 模型配置
  model_path: "models/SAC_actor.pth"  # PyTorch 模型路径

  # 控制参数
  max_v: 1.0                             # 最大线速度 (m/s)
  max_w: 1.0                             # 最大角速度 (rad/s)

  # 工作频率 (Hz)
  frequency: 5.0

  # 日志配置
  log_enabled: true

