# GPS导航系统配置文件
# 所有可调参数在此统一配置

# ============================================================
# EKF融合节点配置
# ============================================================
ekf_fusion_node:
  # 节点运行频率 (Hz)
  frequency: 10.0 # 每次融合的时间步长dt由频率决定

  # ========== 订阅话题 ==========
  subscriptions:
    gps_topic: "/rtk_fix" # 用于获取gps坐标
    odom_topic: "/utlidar/robot_odom" # 用于获取里程计数据，frame_id=odom
    imu_topic: "/imu/data" # 用于获取imu数据，frame_id=imu

  # ========== 发布话题 ==========
  publications:
    fusion_pose_topic: "/navigation/fusion_pose"   # 发送融合后定位,frame_id=gcj
    gps_weight_topic: "/navigation/gps_weight" # 发送gps权重，暂时没有用到

  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  gps_timeout: 0.9
  odom_timeout: 0.09
  imu_timeout: 0.09

  # GPS质量阈值
  # GPS位置协方差阈值，用于判断GPS信号质量。协方差小于此值认为GPS信号良好，大于此值认为信号差
  gps_position_covariance_threshold: 0.5
  # GPS信号良好时的测量噪声（协方差小于阈值时使用）
  gps_measurement_noise_good: 0.1
  # GPS信号差时的测量噪声（协方差大于阈值时使用，增大噪声降低GPS权重）
  gps_measurement_noise_bad: 10.0
  gps_satellite_min: 6  # 最小卫星数要求，暂时弃用

  # EKF参数 - 用于扩展卡尔曼滤波的预测和校正步骤
  # 代表模型对里程计位置预测的不确定性，当融合定位不准时可适当调大该值
  process_noise_position: 0.1
  # 代表模型对里程计航向角预测的不确定性，当融合定位不准时可适当调大该值
  process_noise_yaw: 0.05  
  # 代表里程计测量的噪声
  odom_measurement_noise: 0.1
  # 代表IMU航向角测量的不确定性，当融合定位不准时可适当调大该值
  imu_measurement_noise_yaw: 0.1


  # 日志配置
  log_frequency_stats: true

  # ========== 融合模式配置 ==========
  # 是否融合odom和imu (true: 融合odom+imu+GPS, false: 只使用GPS)
  use_odom_imu_fusion: true

# ============================================================
# 规划器节点配置
# ============================================================
planner_node:
  # ========== 订阅话题 ==========
  subscriptions:
    # 机器人里程计
    robot_pose_topic: "/navigation/map_pose" #订阅机器人在地图坐标系中的坐标，frame_id=map
    # 导航地图坐标（从 map_node 订阅）
    nav_map_points_topic: "/navigation/nav_map_points" # 订阅航点在地图坐标系中的坐标，frame_id=map

  # ========== 发布话题 ==========
  publications:
    path_topic: "/navigation/planned_path" #发送规划路径。frame_id=map，消息类型为nav_msgs/Path

  # 工作频率 (Hz)
  frequency: 5.0

  # 时间戳超时时间 (秒)
  pose_timeout: 0.09 # 机器人坐标超时时间

  # 到达判定阈值 (米)
  arrival_threshold: 3.0

  # 稀疏化参数
  # 相邻两个路点之间的最小距离（米），根据地图分辨率计算具体间隔的格子数
  # 用于路径稀疏化，减少路点数量但保持路径的关键拐点
  max_distance_between: 5.0

  # A*算法参数
  # allow_diagonal: 控制是否允许对角线移动。
  # false=只允许上下左右4方向移动，true=允许8方向（含对角线）
  allow_diagonal: false

  # 日志配置
  log_enabled: true

# ============================================================
# 激光雷达Costmap节点配置
# ============================================================
lidar_costmap_node:
  # ========== 订阅话题 ==========
  subscriptions:
    scan_topic: "/livox/lidar"           # 获取激光雷达点云，frame_id=livox_frame

  # ========== 发布话题 ==========
  publications:
    obs_output_topic: "/navigation/obs_min_distance"          # 障碍物距离输出话题，用于给controller节点输入模型，frame_id=base_link
    local_costmap_topic: "/navigation/local_costmap"   # 局部costmap输出（供地图节点更新地图），frame_id=base_link

  # 高度过滤 (米)
  min_height: -1.0             # 最低高度
  max_height: 1.5              # 最高高度

  # 稀疏化参数
  downsampling_factor: -1        # 降采样因子，-1/0表示不降采样，>=2表示每隔n个点取1个

  # 工作频率 (Hz)
  frequency: 10.0

  # Costmap参数
  costmap_resolution: 0.05       # 局部costmap分辨率 (米/格)
  costmap_value: 100            # 障碍物填充值

  # RL输入参数
  bin_num: 20                   # 前方180度的分区数量

  # 日志配置
  log_enabled: true

# ============================================================
# Odom节点配置
# ============================================================
odom_node:
  # ========== 订阅话题 ==========
  subscriptions:
    old_odom_topic: "/utlidar/robot_odom"   # 旧odom（机器狗开机自启动）,frame_id=odom
    gps_topic: "/rtk_fix"                   # RTK GPS,frame_id=gcj
    map_origin_gps_topic: "/navigation/map_origin_gps"  # 地图原点GPS（来自map_node）,frame_id=gcj

  # ========== 发布话题 ==========
  publications:
    new_odom_topic: "/navigation/new_odom"  # 新odom（原点为main.py启动时GPS）,frame_id=odom
    new_odom_origin_gps_topic: "/navigation/new_odom_origin_gps"  # 新odom原点GPS（供tf_publisher使用）,frame_id=gcj

  # 日志配置
  log_enabled: true

# ============================================================
# TF发布节点配置
# ============================================================
tf_publisher:
  # URDF 文件路径
  urdf_path: "/home/unitree/navigation_system/URDF/GO2_URDF/urdf/go2_description.urdf"

  # 订阅话题
  subscriptions:
    map_origin_gps_topic: "/navigation/map_origin_gps"      # 地图原点GPS（来自map_node）,frame_id=gcj
    new_odom_origin_gps_topic: "/navigation/new_odom_origin_gps"  # 新odom原点GPS（来自odom_node）,frame_id=gcj
    new_odom_topic: "/navigation/new_odom"    # 新odom（来自odom_node）,frame_id=odom

  # 日志配置
  log_enabled: true

# ============================================================
# 地图节点配置
# ============================================================
map_node:
  # ========== 订阅话题 ==========
  subscriptions:
    gps_path_topic: "/navigation_control"              # 下发的 GPS 导航路径,frame_id=gcj
    fusion_pose_topic: "/navigation/fusion_pose"          # 融合定位,frame_id=gcj
    rtk_imu_topic: "/rtk_imu"                # RTK IMU,frame_id=gcj
    local_costmap_topic: "/navigation/local_costmap"      # 接收局部costmap,frame_id=base_link

  # ========== 发布话题 ==========
  publications:
    map_topic: "/map"                         # 全局地图（供rviz2可视化和其他节点使用）,frame_id=map
    map_update_topic: "/map_update"           # 地图增量更新（OccupancyGridUpdate）,frame_id=map
    nav_map_points_topic: "/navigation/nav_map_points"    # 导航地图坐标（供 planner_node 使用）,frame_id=map
    map_pose_topic: "/navigation/map_pose"               # 计算出的地图坐标系定位,frame_id=map
    map_origin_gps_topic: "/navigation/map_origin_gps"  # 地图原点GPS（供tf_publisher使用）,frame_id=gcj

  # 工作频率 (Hz)
  frequency: 10.0

  # 日志配置
  log_enabled: true

# ============================================================
# 控制器节点配置
# ============================================================
controller_node:
  # ========== 订阅话题 ==========
  subscriptions:
    path_topic: "/navigation/planned_path"           # 路径话题（来自 planner_node）,frame_id=map
    lidar_obs_topic: "/navigation/obs_min_distance"         # 障碍物观测（来自 lidar_costmap_node）,frame_id=base_link
    map_pose_topic: "/navigation/map_pose"           # 机器狗地图坐标（来自 map_node）,frame_id=map
    odom_topic: "/navigation/new_odom"               # 里程计,frame_id=odom

  # ========== 发布话题 ==========
  publications:
    cmd_topic: "/cmd_vel"                # 控制指令

  # 模型配置
  model_path: "models/SAC_actor.pth"  # PyTorch 模型路径

  # 控制参数
  max_v: 1.0                             # 最大线速度 (m/s)
  max_w: 1.0                             # 最大角速度 (rad/s)
  arrival_threshold: 2.0                  # 到达目标点阈值 (米)

  # 工作频率 (Hz)
  frequency: 5.0

  # 日志配置
  log_enabled: true

