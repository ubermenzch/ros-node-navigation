# GPS导航系统配置文件
# 所有可调参数在此统一配置

# ============================================================
# EKF融合节点配置
# ============================================================
ekf_fusion_node:
  # 节点运行频率 (Hz)
  frequency: 10.0 # 每次融合的时间步长dt由频率决定

  # ========== 订阅话题 ==========
  subscriptions:
    gps_topic: "/rtk_fix" # 用于获取gps坐标
    odom_topic: "/utlidar/robot_odom" # 用于获取里程计数据，frame_id=odom
    world_orientation_topic: "/rtk_imu" # RTK 计算输出的世界系朝向话题

  # ========== 发布话题 ==========
  publications:
    map_pose_topic: "/navigation/map_pose"  # 地图坐标系定位,frame_id=map
    # map_origin_gps 不再发布（通过 TF 变换可知）

  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  gps_timeout: 0.9
  odom_timeout: 0.2
  world_orientation_timeout: 0.5  # 世界系朝向超时时间

  # 融合参数
  # gps_alpha: GPS/世界系朝向融合权重 [0,1]
  #   - 位置融合: 控制 GPS 位置与 odom 传播位置的融合
  #   - 朝向融合: 控制世界系朝向与 odom 角速度积分的融合
  #   - 1.0 = 完全信任 GPS/世界系朝向, 0.0 = 完全信任 odom
  gps_alpha: 0.30
  # 单次GPS跳变拒绝阈值（米），超过此值的GPS跳变将被忽略
  gps_jump_reject: 2.5
  # 单次朝向跳变拒绝阈值（弧度），超过此值的朝向跳变将被忽略
  yaw_jump_reject: 0.5  # 0.5弧度约28.6度

  # 日志配置
  log_enabled: true

# ============================================================
# 规划器节点配置
# ============================================================
planner_node:
  # ========== 订阅话题 ==========
  subscriptions:
    # 机器人里程计
    robot_pose_topic: "/navigation/map_pose" #订阅机器人在地图坐标系中的坐标，frame_id=map
    # 导航地图坐标（从 map_node 订阅）
    nav_map_points_topic: "/navigation/nav_map_points" # 订阅航点在地图坐标系中的坐标，frame_id=map

  # ========== 发布话题 ==========
  publications:
    path_topic: "/navigation/planned_path" #发送规划路径。frame_id=base_link，消息类型为nav_msgs/Path

  # 工作频率 (Hz)
  frequency: 5.0

  # 时间戳超时时间 (秒)
  pose_timeout: 0.2 # 机器人坐标超时时间

  # 到达判定阈值 (米)
  arrival_threshold: 3.0

  # 稀疏化参数
  # 相邻两个路点之间的最小距离（米），根据地图分辨率计算具体间隔的格子数
  # 用于路径稀疏化，减少路点数量但保持路径的关键拐点
  max_distance_between: 5.0

  # A*算法参数
  # allow_diagonal: 控制是否允许对角线移动。
  # false=只允许上下左右4方向移动，true=允许8方向（含对角线）
  allow_diagonal: false

  # 日志配置
  log_enabled: true

# ============================================================
# 激光雷达Costmap节点配置
# ============================================================
lidar_costmap_node:
  # ========== 订阅话题 ==========
  subscriptions:
    scan_topic: "/livox/lidar"           # 获取激光雷达点云，frame_id=livox_frame

  # ========== 发布话题 ==========
  publications:
    obs_output_topic: "/navigation/obs_min_d"          # 障碍物距离输出话题，用于给controller节点输入模型，frame_id=base_link
    local_costmap_topic: "/navigation/local_costmap"   # 局部costmap输出（供地图节点更新地图）,frame_id=base_link

  # 扫描范围 (米)
  scan_range: 10.0

  # 高度过滤 (米)
  min_height: -0.4             # 最低高度
  max_height: 1.5              # 最高高度

  # 稀疏化参数
  downsampling_factor: 3.0        # 降采样因子，-1/0表示不降采样，>=2表示每隔n个点取1个

  # 工作频率 (Hz)
  frequency: 10.0

  # Costmap参数
  costmap_value: 100            # 障碍物填充值

  # RL输入参数
  bin_num: 20                   # 前方180度的分区数量
  ray_angle_step_deg: 1.0       # 射线角度间隔 (度)

  # 超时参数 (秒)
  cloud_timeout: 1.0            # 点云超时阈值

  # 日志配置
  log_enabled: true

