# GPS导航系统配置文件
# 所有可调参数在此统一配置

# ============================================================
# EKF融合节点配置
# ============================================================
ekf_fusion_node:
  # 节点运行频率 (Hz)
  frequency: 30.0 # 每次融合的时间步长dt由频率决定

  # ========== 订阅话题 ==========
  subscriptions:
    gps_topic: /rtk_fix # 用于获取gps坐标
    odom_topic: /utlidar/robot_odom # 用于获取里程计数据，frame_id=odom
    world_orientation_topic: /rtk_imu # RTK 计算输出的世界系朝向话题

  # ========== 发布话题 ==========
  publications:
    map_pose_topic: /navigation/map_pose  # 地图坐标系定位,frame_id=map
    gps_map_pose_topic: /navigation/gps_map_pose  # GPS原始位姿（用于可视化对比）,frame_id=map
    # map_origin_gps 不再发布（通过 TF 变换可知）

  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  gps_timeout: 0.9
  odom_timeout: 0.2
  world_orientation_timeout: 0.5  # 世界系朝向超时时间

  # 融合参数
  # gps_alpha: GPS/世界系朝向融合权重 [0,1]
  #   - 位置融合: 控制 GPS 位置与 odom 传播位置的融合
  #   - 朝向融合: 控制世界系朝向与 odom 角速度积分的融合
  #   - 1.0 = 完全信任 GPS/世界系朝向, 0.0 = 完全信任 odom
  gps_alpha: 0.0
  # 单次GPS跳变拒绝阈值（米），超过此值的GPS跳变将被忽略
  gps_jump_reject: 999.0
  # 单次朝向跳变拒绝阈值（弧度），超过此值的朝向跳变将被忽略
  yaw_jump_reject: 999.0  # 0.5弧度约28.6度

  # 启动时是否朝正东
  # 当设为 true 时，机器人在启动时默认朝向正东，此时里程计 yaw=0 对应世界系 yaw=0
  # 当设为 false 时，使用 world_orientation_topic 提供世界系朝向
  # 该参数用于无法提供世界系朝向的情况，通过将里程计朝向当作世界系朝向来解决对齐问题
  face_east_on_startup: true

  # 日志配置
  log_enabled: true
  
# ============================================================
# 激光雷达Costmap节点配置
# ============================================================
lidar_costmap_node:
  # ========== 订阅话题 ==========
  subscriptions:
    scan_topic: /my_lidar           # 获取激光雷达点云/livox/lidar，frame_id=livox_frame

  # ========== 发布话题 ==========
  publications:
    obs_output_topic: /navigation/obs_min_d          # 障碍物距离输出话题，用于给controller节点输入模型，frame_id=base_link
    local_costmap_topic: /navigation/local_costmap   # 局部costmap输出（供地图节点更新地图）,frame_id=base_link
    voxel_cloud_topic: /navigation/voxel_cloud

  # 扫描范围 (米)
  scan_range: 10.0

  # 高度过滤 (米)
  min_height: -0.1             # -0.35，最低高度
  max_height: 1.0              # 最高高度

  
  voxel_size: 0.2 #体素尺寸
  min_points_per_voxel: 1 #最小点数阈值

  # 工作频率 (Hz)
  frequency: 10.0

  # Costmap参数
  costmap_value: 100            # 障碍物填充值

  # RL输入参数
  bin_num: 20                   # 前方180度的分区数量
  ray_angle_step_deg: 2.0       # 射线角度间隔 (度)

  # 超时参数 (秒)
  cloud_timeout: 1.0            # 点云超时阈值

  # 日志配置
  log_enabled: true

map_planner_node:
  # 地图生成参数
  # square_size: 在机器人位置和所有航点边界的基础上，向外扩展的边距（米）
  #              用于确保地图有足够的空间，公式: min_x = min(all_points) - square_size
  square_size: 20.0
  # road_width: 道路的有效通行宽度（米），用于在地图上绘制道路区域
  #             机器人将沿此宽度范围内的路径行驶
  road_width: 40.0
  # - 每隔 road_sample_step 米在路径上采样一个点
  # - 以每个采样点为中心画圆形区域（半径 = road_width / 2）
  # - 圆形区域内的栅格设为空闲 (0)，外部保持原值
  road_sample_step: 1.0 #单位m

  # 膨胀参数
  # 膨胀形状为正方形，边长 = inflation_margin * 2（米）
  # 例如：inflation_margin=0.3，则膨胀正方形边长 = 0.6 米
  inflation_margin: 0.2 #单位m

  # 地图发布方式
  # true = 每次局部更新都发送完整 OccupancyGrid
  # false = 发送 OccupancyGridUpdate 增量更新
  publish_full_map: true
  
  inflation_enabled: false 
  # 超时参数
  map_pose_timeout: 1.0
  local_costmap_timeout: 0.3

  # 规划参数
  max_distance_between: 3.0
  allow_diagonal: false
  arrival_threshold: 2.0
  arrival_check_frequency: 2.0  # 航点到达检查频率 (Hz)
  obstacle_threshold: 50

  # 规划参数

  # 日志
  log_enabled: true

  subscriptions:
    gps_path_topic: /navigation_control
    map_pose_topic: /navigation/map_pose
    local_costmap_topic: /navigation/local_costmap

  publications:
    map_topic: /navigation/map
    map_update_topic: /navigation/map_updates
    inflated_map_topic: /navigation/inflated_map       # 膨胀后的完整地图（首次生成后发布一次）
    inflated_map_update_topic: /navigation/inflated_map_updates  # 膨胀地图局部更新
    nav_map_points_topic: /navigation/nav_map_points
    path_topic: /navigation/planned_path           # base_link 坐标系，供 controller 使用
    path_map_topic: /navigation/planned_path_map    # map 坐标系，供 rviz 可视化使用
    
# ============================================================
# 控制器节点配置
# ============================================================
controller_node:
  # ========== 订阅话题 ==========
  subscriptions:
    path_topic: /navigation/planned_path           # 路径话题（来自 planner_node）,frame_id=base_link
    lidar_obs_topic: /navigation/obs_min_d         # 障碍物观测（来自 lidar_costmap_node）,frame_id=base_link
    odom_topic: /utlidar/robot_odom               # 里程计,frame_id=odom (机器狗自带里程计)

  # ========== 发布话题 ==========
  publications:
    cmd_topic: /cmd_vel                # 控制指令

  # 超时配置 (秒)
  # 当前时间 - 最后一次收到该传感器数据的时间 > 超时阈值 则认为该传感器数据丢失
  path_timeout: 999          # 路径超时时间
  lidar_obs_timeout: 999     # 障碍物观测超时时间
  odom_timeout: 999           # 里程计超时时间

  # 模型配置
  model_path: "models/ETH25/SAC_actor.pth"  # PyTorch 模型路径

  # 控制参数
  max_v: 1.0                             # 最大线速度 (m/s)
  max_w: 1.0                             # 最大角速度 (rad/s)

  # 工作频率 (Hz)
  frequency: 10.0

  # 日志配置
  log_enabled: true

# ============================================================
# 通用配置
# ============================================================
common:
  # 地图分辨率 (米/格) - map_node 和 lidar_costmap_node 共用
  resolution: 0.2

  # ============================================================
  # 测试模式配置
  # ============================================================
  # 开启测试模式时不启动 controller_node，由遥控器手动控制机器人
  test_mode: false
